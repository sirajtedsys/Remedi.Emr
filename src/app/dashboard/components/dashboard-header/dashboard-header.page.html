  <ion-header class="custom-top-header">

        <ion-toolbar>

          <!-- LEFT SECTION -->
          <ion-buttons slot="start">
            <ion-button fill="clear" class="top-btn" (click)="toggleSidebar.emit()">
              <ion-icon name="menu-outline"></ion-icon>
            </ion-button>

            <ion-button fill="clear" class="circle-btn">
              <img src="assets/icon/heart.png">
            </ion-button>

            <ion-button fill="clear" class="circle-btn">
              <img src="assets/icon/medical.png">
            </ion-button>

            <ion-button fill="clear" class="circle-btn">
              <img src="assets/icon/avatar.png">
            </ion-button>
          </ion-buttons>

          <!-- CENTER STATS -->
          <div class="stats-container">

            <!-- OP -->
            <div class="stat-group">
              <!-- OP -->
              <div class="op-stat">
                <div class="op-strip">O<br>P</div>

                <div class="op-box">
                  <div class="op-item">
                    <span class="label">Total</span>
                    <span class="value">28</span>
                  </div>

                  <div class="op-item">
                    <span class="label">Consulted</span>
                    <span class="value">8</span>
                  </div>

                  <div class="op-item">
                    <span class="label">Waiting</span>
                    <span class="value">20</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- IP -->
            <div class="stat-group">
              <div class="vertical-strip">I<br>P</div>
              <div class="stat-box single">

                <div>
                  <ion-badge>-7</ion-badge>
                  <span>Total</span>
                </div>
              </div>
            </div>

            <!-- CCOP -->
            <div class="stat-group">
              <div class="vertical-strip">C<br>C<br>O<br>P</div>
              <div class="stat-box single">
                <div>Total <ion-badge>0</ion-badge></div>
              </div>
            </div>

            <!-- CCOP -->
            <div class="stat-group">
              <div class="vertical-strip">C<br>C<br>I<br>P</div>
              <div class="stat-box single">
                <div>Total <ion-badge>0</ion-badge></div>
              </div>
            </div>

            <!-- ED -->
            <div class="stat-group">
              <div class="vertical-strip">E<br>D</div>
              <div class="stat-box single">
                <div>Total <ion-badge>18</ion-badge></div>
              </div>
            </div>

            <!-- NC -->
            <div class="stat-group">
              <div class="vertical-strip">N<br>C</div>
              <div class="stat-box single">
                <div>Total <ion-badge>0</ion-badge></div>
              </div>
            </div>

            <!-- EMR -->
            <div class="emr-box">
              <a href=""><img src="assets/icon/emr-icon.png" class="custom-icon" /></a>
            </div>

            <!-- APP -->
            <div class="stat-group">
              <div class="vertical-strip">A<br>P<br>P</div>
              <div class="stat-box single">
                <div>Total <ion-badge>28</ion-badge></div>
              </div>
            </div>

          </div>

          <!-- RIGHT SECTION -->
          <ion-buttons slot="end">

            <!-- <ion-chip>
              <ion-label>
                <div class="chip-title">Alexxy</div>
                <div class="chip-role">Optometrist</div>
              </ion-label>
            </ion-chip> -->

            <ion-button fill="clear" class="top-btn">
              <ion-icon name="settings-outline"></ion-icon>
            </ion-button>

            <!-- Profile Avatar -->
            <ion-avatar id="profileTrigger" class="header-avatar">
              <img src="assets/icon/man.png" />
            </ion-avatar>
            <ion-popover trigger="profileTrigger" side="bottom" alignment="end" class="profile-popover"
              [dismissOnSelect]="true">
              <ng-template>
                <div class="profile-dropdown">
                  <!-- Profile Info -->
                  <div class="profile-info">
                    <ion-avatar class="dropdown-avatar">
                      <img src="assets/icon/man.png" />
                    </ion-avatar>
                    <div>
                      <h4>Alexxy</h4>
                      <p>Optometrist</p>
                    </div>
                  </div>
                  <ion-list lines="none">
                    <ion-item button>
                      <ion-icon name="person-outline" slot="start"></ion-icon>
                      <ion-label>My Profile</ion-label>
                    </ion-item>
                    <ion-item button>
                      <ion-icon name="settings-outline" slot="start"></ion-icon>
                      <ion-label>Account Settings</ion-label>
                    </ion-item>
                    <ion-item button color="danger" (click)="logout()">
                      <ion-icon name="log-out-outline" slot="start"></ion-icon>
                      <ion-label>Logout</ion-label>
                    </ion-item>
                  </ion-list>
                </div>
              </ng-template>
            </ion-popover>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
