<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Patient Message</ion-title>
  </ion-toolbar>
</ion-header>
<!-- <ion-content class="patient-msg-content"> -->
  <ng-container class="patient-msg-content">
  <ion-card  >
    <ion-card-header>
      <ion-card-title></ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <!-- Message Input -->
      <ion-item>
        <ion-label position="stacked">Message</ion-label>
         <ion-textarea
          rows="4"
          placeholder="Enter patient message here"
          [(ngModel)]="patmsg.OPN_MESSAGE"
          [ngModelOptions]="{ standalone: true }">
        </ion-textarea>

      </ion-item>

      <!-- Alert Checkbox -->
      <ion-item lines="none">
        <!-- <ion-checkbox
          slot="start"
          [(ngModel)]="isAlertChecked">
        </ion-checkbox> -->
        <ion-checkbox
        slot="start"
        [(ngModel)]="isAlertChecked"
        [ngModelOptions]="{ standalone: true }">
      </ion-checkbox>

      <ion-label>Alert Message</ion-label>
      </ion-item>

      <!-- Patient Type -->
      <ion-item>
        <ion-label position="stacked">Patient Type</ion-label>
        <ion-select
          [(ngModel)]="patientTypeId" [ngModelOptions]="{ standalone: true }"
          (ionChange)="onPatientTypeChange($event)"
          placeholder="Select Patient Type" interface="popover">
          <ion-select-option
            *ngFor="let type of patTypeList"
            [value]="type.id">
            {{ type.name }}
          </ion-select-option>
        </ion-select>

      </ion-item>

      <!-- Save Button -->
      <ion-button expand="block"   class="save-btn ion-margin-top" (click)="Submit()">
        Save
      </ion-button>

    </ion-card-content>
  </ion-card>


  <!-- Messages List -->
  <ion-card *ngIf="DateList.length > 0" >
    <ion-card-content>

      <ng-container *ngFor="let date of DateList">

        <!-- Date Header -->
        <ion-item >
          <ion-label class="ion-text-center"  style="background-color: #cef1f3; padding: .8rem .5rem;">
            {{ date | date: 'dd/MM/yyyy' }}
          </ion-label>
        </ion-item>

        <!-- Messages -->
        <ion-list>
          <ion-item
            *ngFor="let msg of allMessagesByDate[(date | date:'dd/MM/yy') || ''] ?? []"
            [class.alert-row]="msg.alerT_MSG === 'Y'">

            <ion-label>
              <h3>{{ msg.opN_MESSAGE }}</h3>
              <p>{{ msg.emP_OFFL_NAME }}</p>
            </ion-label>

            <ion-button
              slot="end"
              size="small"
              (click)="onEdit(msg)">
              Edit
            </ion-button>

          </ion-item>
        </ion-list>

      </ng-container>

    </ion-card-content>
  </ion-card>

  
    <ion-modal [isOpen]="showMewsModal" cssClass="mews-modal">
  <ng-template>
  <ion-header>
  <ion-toolbar>
    <ion-title>Patient Message Edit</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeMewsModal()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="edit-modal-content">

  <!--  Original Message -->
<ion-item lines="full">
  <ion-label position="stacked">Message</ion-label>
  <ion-textarea
    [value]="editMsg.ORIGINAL_MESSAGE"
    readonly>
  </ion-textarea>
</ion-item>


  <!-- Edit Status -->
  <ion-item lines="full">
    <ion-label position="stacked">Edit Status</ion-label>
    <ion-select [(ngModel)]="editMsg.EDIT_STATUS" placeholder="Select action" interface="popover">
      <ion-select-option value="E">Edit</ion-select-option>
      <ion-select-option value="D">Delete</ion-select-option>
    </ion-select>
  </ion-item>

  <!-- New Message (ONLY for Edit) -->
  <ion-item lines="full" *ngIf="editMsg.EDIT_STATUS === 'E'">
    <ion-label position="stacked">New Message</ion-label>
    <ion-textarea
      [(ngModel)]="editMsg.OPN_MESSAGE"
      placeholder="Enter new message">
    </ion-textarea>
  </ion-item>

  <!-- Remarks (ONLY for Delete) -->
  <ion-item lines="full">
    <ion-label position="stacked">Remarks</ion-label>
    <ion-textarea
      [(ngModel)]="editMsg.REMARKS"
      placeholder="Remarks">
    </ion-textarea>
  </ion-item>

  <!-- Submit -->
<ion-button
  expand="block"

  class="ion-margin-top"
  (click)="submitEditRequest()">
  Submit Edit Request
</ion-button>

</ion-content>



  
  </ng-template>
</ion-modal>

</ng-container>

<!-- </ion-content> -->
