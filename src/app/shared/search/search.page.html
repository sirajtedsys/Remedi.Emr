  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-md-12" >
        <div class="input-group mb-3" *ngIf="ShowSearchBox">
          <input
            type="text"
            class="form-control"
            placeholder="Search items..."
            [(ngModel)]="searchTerm"
            (input)="onSearchChange()"
          />
          <button class="btn btn-primary" *ngIf="ShowSearchBox" type="button" (click)="performSearch()">
            Search
          </button>
        </div>

        <div *ngIf="filteredItems.length > 0; else noResults" class="table-responsive">
          <table class="table table-striped table-hover table-bordered c-point">
            <thead>
              <tr>
                <th *ngFor="let header of SearcHeaders">{{ header }}</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of filteredItems" (click)="selectItem(item)">
                <td *ngFor="let key of KeyNames">
                  {{ item[key] }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <ng-template #noResults>
          <div class="alert alert-info" role="alert">
            No results found.
          </div>
        </ng-template>
      </div>
    </div>
  </div>
